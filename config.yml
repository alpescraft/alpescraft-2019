      id: "moinsmieux"
      short_description: "<p>
        💡 Marre de courir après le temps ?
        On nous vend la productivité comme une course sans fin à la performance. Résultat ? Des journées surchargées, du stress et une to-do list qui ne désemplit jamais. Spoiler : ce n’est pas comme ça qu’on avance.
      </p>"
      description: "<p>💡 Marre de courir après le temps ?
