    - name: "Dev du grenier : Gilded Rose"
      id: "gildedrose"
      short_description: "<p>Le kata Gilded Rose est devenu un classique : il permet de montrer comment sécuriser du code legacy à l'aide d'un golden master, et offre un terrain de jeu idéal pour mettre en avant des refactorings spectaculaires.</p>

<p>Mais s'en tenir à ça serait passer à côté de toute la richesse et du potentiel caché de ce kata.</p>"
      description: "
<p>Le kata Gilded Rose est devenu un classique : il permet de montrer comment sécuriser du code legacy à l'aide d'un golden master, et offre un terrain de jeu idéal pour mettre en avant des refactorings spectaculaires.</p>

<p>Mais s'en tenir à ça serait passer à côté de toute la richesse et du potentiel caché de ce kata. Dans cet atelier en live-coding fortement interactif, nous prenons Gilded Rose comme point de départ pour explorer d'autres possibilités autour du travail sur le legacy :</p>

<ul>
  <li><strong>Adopter le bon état d'esprit</strong> : on ne panique pas, on reste lucide, calme et méthodique, et on prend même du plaisir à travailler sur le legacy</li>
  <li><strong>Sécuriser le code</strong> : nous illustrerons diverses approches pour contruire un filet de sécurité ; au-delà de ça, nous challengerons les limites de la couverture de tests et montrerons comment renforcer la fiabilité de notre golden master</li>
  <li><strong>Définir une stratégie de refactoring</strong> : il existe plusieurs approches (notamment classique ou ludique), l'important est de ne pas succomber à la facilité (pour éviter les optimums locaux), et nous verrons dans quelle mesure la stratégie de refactoring est étroitement liée à la stratégie de testing</li>
      </ul>
      "
      type: "workshop"
      salle: ""
      date: ""
      roti: ""
      categories:
