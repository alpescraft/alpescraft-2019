  Schedule:
    - name: "La Voie du code : développer du logiciel pour se développer personnellement"
      id: "voieducode"
      short_description: "<p>L'acte de programmation est souvent considéré comme un moyen pour atteindre une fin: ajouter des fonctionnalités à un produit existant, apprendre de nouvelles techniques qui brilleront sur un CV, gagner de l'argent, éviter des douleurs vécues par le passé, etc. Un tel acte n'offre qu'une valeur indirecte – qu'il s'agisse d'un effort qui portera (peut-être) ses fruits dans un futur plus ou moins distant, ou d'une tentative de corriger le passé.</p>"
      description: "
      <p>L'acte de programmation est souvent considéré comme un moyen pour atteindre une fin: ajouter des fonctionnalités à un produit existant, apprendre de nouvelles techniques qui brilleront sur un CV, gagner de l'argent, éviter des douleurs vécues par le passé, etc. Un tel acte n'offre qu'une valeur indirecte – qu'il s'agisse d'un effort qui portera (peut-être) ses fruits dans un futur plus ou moins distant, ou d'une tentative de corriger le passé. De telles dynamiques nous éloignent de la réalité du moment présent. Elles génèrent déception et souffrance, en exacerbant un contraste entre « ce qui est » ici et maintenant et « ce qui (dans notre imagination) devrait être ». Pourrions-nous envisager l'acte de programmation d'une autre manière, qui serait à la fois source de paix, de joie et d'épanouissement dans le moment présent ?

</p><p>La pratique du yoga a pour but de ressentir une (ré)union entre ce qui se passe « au dedans » (les émotions, les concepts, les souhaits et espoirs) avec ce qui se passe « au dehors » (les phénomènes qui activent nos sens). Il existe de nombreuses méthodes pour atteindre ce but. La programmation pourrait-elle en être une ?

</p><p>Cette session est une invitation à engager une conversation – avec l'espoir de déplacer le centre de gravité de l'acte de programmation vers la recherche d'une expérience de joie et de présence dans le moment présent.
      </p>"
      type: "talk"
      salle: ""
      date: ""
      roti: ""
      categories:
        - "Keynote"
      language: "🇫🇷"
      speakers:
        - speaker:
          speakerid: "emmanuelgaillot"

    - name: "🎮Les quêtes secondaires, ça n'est pas que dans les jeux vidéo !"
      id: "quetesecondaires"
      short_description:  "<p>
        Fallout, Elder Scrolls, The Witcher, Clair-Obscur ou Final Fantasy ; dans tous ces jeux de rôles nous incarnons des personnages investis d'une grande mission, une quête principale comme fil rouge de notre aventure.  
        Mais bien souvent apparaissent autour une multitude de quêtes secondaires, que l'on s'empresse parfois de réaliser afin de gagner en expérience et faciliter notre mission principale.
      </p>"
      description: "<p>
        Fallout, Elder Scrolls, The Witcher, Clair-Obscur ou Final Fantasy ; dans tous ces jeux de rôles nous incarnons des personnages investis d'une grande mission, une quête principale comme fil rouge de notre aventure.  
        Mais bien souvent apparaissent autour une multitude de quêtes secondaires, que l'on s'empresse parfois de réaliser afin de gagner en expérience et faciliter notre mission principale.  
        </p>
        <p>
        Et s'il était possible de faire de même dans la vie réelle ?  
        Si à côté de la quête principale que pourrait constituer notre vie professionnelle se cachaient des quêtes annexes insoupçonnées ?  
        </p>
        <p>
        A partir de mes quêtes secondaires personnelles, découvrez quels mécanismes permettent ce transfert d'aptitudes, et comment vous aussi vous pouvez repérer ces objectifs cachés, voire en être à l'initiative !
        </p>"
