      bio: "
        <p>Ingénieure logiciel passionnée par l’<strong>architecture de systèmes complexes</strong>, je suis aussi co-fondatrice du collectif nantais <strong>Hi Web !</strong> : une équipe engagée, majoritairement féminine, qui accompagne les entrepreneures dans leur stratégie digitale.</p>
        <p><strong>Code solide</strong> et <strong>sororité</strong>, mon parcours navigue entre <strong>tech</strong>, <strong>entreprenariat</strong> et <strong>empowerment féminin</strong>. Aujourd’hui, j’explore ces mondes à travers deux projets incubés à la <strong>Cantine du Numérique</strong> : l’un sur la <strong>productivité sans charge mentale</strong>, l’autre pour rassembler et connecter des personnes ayant vécu des <strong>chocs émotionnels similaires</strong>. Deux sujets très différents, mais un même fil rouge : l’envie de créer, en code comme en société, des <strong>projets rassembleurs et libérateurs</strong>.</p>
        <p>J’interviens dans des événements comme la <strong>DevFest Nantes</strong>, <strong>Nantes Digital Week</strong> ou <strong>Who Runs The Tech</strong>, toujours avec la même envie : <strong>rendre la technique vivante et accessible à tou·tes.</strong></p>
        <p>Et si vous aimez parler dev, danse traditionnelle, surf ou de pourquoi je n’aime pas le café… je suis là pour ça aussi !</"
      short_bio: ""

  Schedule:
    - name: "🎮Les quêtes secondaires, ça n'est pas que dans les jeux vidéo !"
      id: "quetesecondaires"
      short_description:  "<p>
        Fallout, Elder Scrolls, The Witcher, Clair-Obscur ou Final Fantasy ; dans tous ces jeux de rôles nous incarnons des personnages investis d'une grande mission, une quête principale comme fil rouge de notre aventure.  
        Mais bien souvent apparaissent autour une multitude de quêtes secondaires, que l'on s'empresse parfois de réaliser afin de gagner en expérience et faciliter notre mission principale.
      </p>"
      description: "<p>
        Fallout, Elder Scrolls, The Witcher, Clair-Obscur ou Final Fantasy ; dans tous ces jeux de rôles nous incarnons des personnages investis d'une grande mission, une quête principale comme fil rouge de notre aventure.  
        Mais bien souvent apparaissent autour une multitude de quêtes secondaires, que l'on s'empresse parfois de réaliser afin de gagner en expérience et faciliter notre mission principale.  
        </p>
        <p>
        Et s'il était possible de faire de même dans la vie réelle ?  
        Si à côté de la quête principale que pourrait constituer notre vie professionnelle se cachaient des quêtes annexes insoupçonnées ?  
        </p>
        <p>
        A partir de mes quêtes secondaires personnelles, découvrez quels mécanismes permettent ce transfert d'aptitudes, et comment vous aussi vous pouvez repérer ces objectifs cachés, voire en être à l'initiative !
        </p>"
      type: "talk"
      salle: ""
      date: ""
      roti: ""
      categories:
        - "Talk"
      language: "🇫🇷"
      speakers:
        - speaker:
          speakerid: "virginiepageaud"

    - name: "Faire MOINS, mais MIEUX : et si c’était ça la vraie productivité ?"
      id: "moinsmieux"
      short_description: "<p>
        💡 Marre de courir après le temps ?
        On nous vend la productivité comme une course sans fin à la performance. Résultat ? Des journées surchargées, du stress et une to-do list qui ne désemplit jamais. Spoiler : ce n’est pas comme ça qu’on avance.
      </p>"
      description: "<p>💡 Marre de courir après le temps ?
        On nous vend la productivité comme une course sans fin à la performance. Résultat ? Des journées surchargées, du stress et une to-do list qui ne désemplit jamais. Spoiler : ce n’est pas comme ça qu’on avance.
        </p>
        <p>👉 Et si la vraie productivité, c’était d’en faire MOINS, mais MIEUX ?
        Dans ce quickie ultra-efficace (sans blabla), initiation à l’Art de la Flemme Productive : des méthodes simples et redoutables pour travailler plus intelligemment, en faire moins… et obtenir de meilleurs résultats.
        </p>
        <p>
        🔥 30 minutes pour comprendre comment en faire MOINS tout en obtenant PLUS. Avec des outils concrets, applicables dès maintenant.
        </p>"
      type: "talk"
      salle: ""
      date: ""
      roti: ""
      categories:
        - "Talk"
      language: "🇫🇷"
      speakers:
        - speaker:
          speakerid: "chloeguilbaud"