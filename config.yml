    - name: "Le code est une Res Publica"
      id: "coderespublica"
      short_description: |
        <p>"Une bataille pour le pouvoir"</p>

                        <p>Pour vous, le code n'est surement qu'une suite d'instructions exécutées par une machine ou dans un cloud. Mais il est en réalité tellement plus que cela. Pouvons-nous même, nous faire une idée réelle de tout ce dont il est l'enjeu ?</p>

                        <p>Le code est le vecteur de l'organisation des entreprises, jusqu'à ses idéaux. Ce n'est pas une technique, c'est un miroir. Et si nous osions regarder au travers, pour une fois ?</p>
      description: |
                <p>"Une bataille pour le pouvoir"</p>

                <p>Pour vous, le code n'est surement qu'une suite d'instructions exécutées par une machine ou dans un cloud. Mais il est en réalité tellement plus que cela. Pouvons-nous même, nous faire une idée réelle de tout ce dont il est l'enjeu ?</p>

                <p>Le code est le vecteur de l'organisation des entreprises, jusqu'à ses idéaux. Ce n'est pas une technique, c'est un miroir. Et si nous osions regarder au travers, pour une fois ?</p>

                <p>À cause de la diversité à produire du code en entreprise, à cause de la multiplicité formes d'organisations possibles, mais aussi des différents credo ou chapelles qu'ont créées les « faiseurs » de code; j'ai pu voir nombre de conflits, de résultats plus ou moins heureux, plus ou moins achevés.</p>

                <p>Une histoire avec des humains, des chef-fes, des technicien-nes, des testeur-euses, des PO, des SM, EM, CTO... Au final, si tout se passe bien, un ou des produits…</p>

                <p>Et aujourd'hui l'IA qui vient s'en emparer et nous en déposseder ... avec la promesse de la réduire comme simple commodité.</p>

                <p><strong>O' Really ???</strong></p>

                <p>Avant de spéculer, je remets tout cela en perspective avec les grandes Sociétés Humaines et l'organisation du Travail. Et je répondrai à ces 6 questions :</p>

                <ol>
                    <li>Qu'est-ce que le code ?</li>
                    <li>Qu'est-ce que le pouvoir de faire du code ?</li>
                    <li>Y a-t-il une société secrète dans votre compagnie ?</li>
                    <li>Quels sont les enjeux du pouvoir ?</li>
                    <li>Quels sont les formes du pouvoir ?</li>
                    <li>Quelles sont les techniques du pouvoir ?</li>
                </ol>
