      text: ""
      mastodon: ""
      bluesky: ""
      bio: "Johan Martinsson est développeur freelance, passionné entre autres par le design du code. Fort de plus de 20 ans d’expérience, il consacre les 15 dernières années à aider des équipes à maîtriser le développement guidé par les tests dans plusieurs langages. Il trouve régulièrement de (bonnes) excuses pour aller montrer un peu de code dans des conférences en France et ailleurs.  Johan a organisé le premier Code Retreat en France, ainsi que le tout premier Legacy Code Retreat mondial avec JB Rainsberger et Rémy Sanlaville. Il est cofondateur du meetup Craft à Grenoble et de la conférence AlpesCraft. Il a aussi longtemps coorganisé le coding dojo grenoblois, SnowCamp et Agile Grenoble."
      short_bio: "Johan Martinsson est développeur freelance, passionné entre autres par le design du code. Fort de plus de 20 ans d’expérience, il consacre les 15 dernières années à aider des équipes à maîtriser le développement guidé par les tests dans plusieurs langages. Il trouve régulièrement de (bonnes) excuses pour aller montrer un peu de code dans des conférences en France et ailleurs.  Johan a organisé le premier Code Retreat en France, ainsi que le tout premier Legacy Code Retreat mondial avec JB Rainsberger et Rémy Sanlaville. Il est cofondateur du meetup Craft à Grenoble et de la conférence AlpesCraft. Il a aussi longtemps coorganisé le coding dojo grenoblois, SnowCamp et Agile Grenoble."

