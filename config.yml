      bio: "Artisan logiciel avec 15 ans d’expérience, j’aide les équipes à améliorer leurs pratiques et l’architecture de leurs applications pour leur permettre de livrer vite et bien en production. Passionné par l’architecture logicielle, les tests, et tout ce qui se termine par DD (TDD, BDD, DDD), je prends le temps de comprendre les problématiques métier avant de coder. Co-organisateur d’Agile Pays Basque, une conférence qui rassemble la communauté Agile de la côte basque."
