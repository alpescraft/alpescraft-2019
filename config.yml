    - name: "La sécurité n’est pas un mur, c’est un jeu de probabilités"
      id: "securiteprobabilites"
      short_description:  |
        <p>On imagine souvent la sécurité comme une forteresse imprenable. En réalité, c’est un jeu de probabilités.</p>
          <p>Souvent, les attaquants ne vous ciblent pas : ils scannent, automatisent, et exploitent ce qui tombe.</p>
          <p>La vraie question n’est donc pas “suis-je sécurisé ?” mais plutôt “suis-je plus sécurisé que mon voisin ?”.</p>
      description: |
        <p>On imagine souvent la sécurité comme une forteresse imprenable. En réalité, c’est un jeu de probabilités.</p>
          <p>Souvent, les attaquants ne vous ciblent pas : ils scannent, automatisent, et exploitent ce qui tombe.</p>
          <p>La vraie question n’est donc pas “suis-je sécurisé ?” mais plutôt “suis-je plus sécurisé que mon voisin ?”.</p>
          <p>Les vulnérabilités critiques ne se cachent pas toujours dans des algorithmes complexes ou des systèmes exotiques. Parfois, elles sont là… dans un commentaire, une configuration par défaut, une ligne copiée depuis internet ou écrite par votre IA favorite.</p>
          <p>Dans cette conférence, nous explorerons des exemples concrets de failles inattendues et nous verrons pourquoi la sécurité est avant tout une question de réduction des risques.</p>
          <p></p>
          <p>Vous repartirez avec une vision claire des garde-fous à mettre en place pour détecter, corriger et surtout prévenir les vulnérabilités.</p>
