      bluesky: ""
      text: "https://x.com/arnaudthiefaine"
      mastodon: ""
      bio: |
        À travers les rôles de développeur, leader technique, coach craft et formateur, Arnaud accompagne startups et grandes entreprises dans l’adoption des pratiques du software craft, en les aidant à améliorer leur code au quotidien grâce à des ateliers et un accompagnement sur mesure. Passionné de Domain-Driven Design, il aime explorer de nouveaux métiers et comprendre leurs enjeux pour mieux aligner le code avec la réalité du terrain. Cette curiosité l’a amené à intervenir dans des secteurs variés tels que l’énergie, la réassurance, la finance de marché ou encore le luxe. Engagé dans la transmission des savoirs, il partage régulièrement son expérience à travers conférences, meetups, podcasts et formations, ainsi que par la publication de ressources accessibles à la communauté. Toujours en quête d’amélioration, il s’efforce d’aider les équipes à construire un logiciel plus durable et centré sur la valeur métier. Arnaud est également co-auteur du livre Software Craft : TDD, Clean Code et autres pratiques essentielles aux éditions Dunod.
      short_bio: "Coach craft, formateur, co-auteur du livre Software Craft."

