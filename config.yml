    - name: "TDD, BDD, ... SDD ? Leçons apprises du BDD pour ne pas refaire les mêmes erreurs avec l'IA"
      id: "sdd"
      short_description: |
        <p>
        Le SDD (Spec Driven Development) se présente comme une approche innovante permettant de développer proprement à l'aire de l'ingénierie assistée par l'IA.
        Mais cette pratique, dont le nom sonne plutôt comme une tautologie, est-elle vraiment si innovante ?
        </p>
      description: |
        <p>
        Le SDD (Spec Driven Development) se présente comme une approche innovante permettant de développer proprement à l'aire de l'ingénierie assistée par l'IA.
        </p>
        <p>
        Mais cette pratique, dont le nom sonne plutôt comme une tautologie, est-elle vraiment si innovante ?
        Avec l'arrivée de l'IA, les éternelles questions de qualité, de spécification, d'alignement, de tests, de documentation, ... refont surface et cette méthode, pas plus que les autres, n'apportera de résultats satisfaisants si l'on n'en saisit pas les vrais enjeux.
        </p>
        <p>
        Ce talk propose de présenter les leçons apprises avec le BDD pour mettre en lumière les erreurs à éviter et donner quelques clés pour parvenir à s'approcher du graal de qualité visé par toutes ces pratiques.
        </p>
