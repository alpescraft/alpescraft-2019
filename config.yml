      bio: "
        <p>Ingénieure logiciel passionnée par l’<strong>architecture de systèmes complexes</strong>, je suis aussi co-fondatrice du collectif nantais <strong>Hi Web !</strong> : une équipe engagée, majoritairement féminine, qui accompagne les entrepreneures dans leur stratégie digitale.</p>
        <p><strong>Code solide</strong> et <strong>sororité</strong>, mon parcours navigue entre <strong>tech</strong>, <strong>entreprenariat</strong> et <strong>empowerment féminin</strong>. Aujourd’hui, j’explore ces mondes à travers deux projets incubés à la <strong>Cantine du Numérique</strong> : l’un sur la <strong>productivité sans charge mentale</strong>, l’autre pour rassembler et connecter des personnes ayant vécu des <strong>chocs émotionnels similaires</strong>. Deux sujets très différents, mais un même fil rouge : l’envie de créer, en code comme en société, des <strong>projets rassembleurs et libérateurs</strong>.</p>
        <p>J’interviens dans des événements comme la <strong>DevFest Nantes</strong>, <strong>Nantes Digital Week</strong> ou <strong>Who Runs The Tech</strong>, toujours avec la même envie : <strong>rendre la technique vivante et accessible à tou·tes.</strong></p>
        <p>Et si vous aimez parler dev, danse traditionnelle, surf ou de pourquoi je n’aime pas le café… je suis là pour ça aussi !</"
      short_bio: ""

