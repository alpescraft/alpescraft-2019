      high_picture: "/img/speakers/emmanuelgaillot.jpeg"
      href: ""
      linkedin: ""
      bluesky: ""
      text: ""
      mastodon: ""
      bio: |
        <p>Praticien du code et de la thérapie, Emmanuel Gaillot intervient en tant qu'accompagnateur d'équipes, formateur, programmeur extrême, psychopraticien, codexhibitionniste et agitateur public. Il est un spécialiste de la gestion de projet incrémentale et de la pensée systémique. Par le biais d'armes non-conventionnelles, il aide depuis plus de 20 ans les équipes produisant du logiciel à être plus efficaces dans leur travail, plus fières de leurs résultats et plus heureuses en général.</p>
        
        <p>Orateur régulier à de nombreuses conférences sur l'agilité, co-organisateur de la première conférence sur le sujet en France, Emmanuel est l'un des fondateurs de la conférence annuelle <a href="http://agileopenfrance.com" target="_blank">Agile Open France</a> et du <a href="http://www.meetup.com/Dojo-developpement-Paris/" target="_blank">Dojo de développement de Paris</a>. Il a créé <a href="https://changer-grandir.org/" target="_blank">Changer/Grandir</a> pour promouvoir les travaux de Virginia Satir auprès du public francophone et il est l'un des associés de la société (coopérative ouvrière de production) <a href="https://omnicite.fr/" target="_blank">Omnicité</a>.</p>
        
        <p>Avec d'autres, il s'occupe de rénover <a href="https://mc-mallaret.fr/" target="_blank">une ferme dans le Massif Central</a> pour créer un lieu de partage et de co-apprentissage.</p>
      short_bio: "Praticien du code et de la thérapie, spécialiste de la gestion de projet incrémentale."

