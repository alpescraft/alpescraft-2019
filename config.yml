    - name: "git reset --hard"
      id: "gitresethard"
      short_description: "
      <p><strong>Et si la poubelle était notre meilleure alliée&nbsp;?</strong></p>

<p>On nous apprend à construire, jamais à détruire.<br>
Pourtant, l'incapacité à jeter du code est l'un des plus grands freins à la qualité logicielle et à l'efficacité des équipes.</p>
      "
      description: "
<p><strong>Et si la poubelle était notre meilleure alliée&nbsp;?</strong></p>

<p>On nous apprend à construire, jamais à détruire.<br>
Pourtant, l'incapacité à jeter du code est l'un des plus grands freins à la qualité logicielle et à l'efficacité des équipes.</p>

<p>Derrière la commande <code>git reset --hard</code> se cache un enjeu qui dépasse largement la technique&nbsp;: notre rapport à l'échec.<br>
Pourquoi nous entêtons-nous sur des pistes sans issue&nbsp;? C’est le piège du biais des coûts irrécupérables.</p>

<p>Ce talk vous invite à changer de paradigme&nbsp;:</p>
<ul>
  <li><strong>Désapprendre l'entêtement</strong> : Comprendre pourquoi notre cerveau nous force à &laquo;&nbsp;sauver&nbsp;&raquo; du mauvais code.</li>
  <li><strong>Sécurité et stabilité avec la stratégie du retour au vert</strong> : Comment le TDD et les petits pas transforment le &laquo;&nbsp;reset&nbsp;&raquo; en un filet de sécurité pour explorer sans crainte.</li>
  <li><strong>L'efficacité collective</strong> : Réduire sa charge mentale (et celle de ses collègues) pour garantir des solutions qui répondent aux besoins avec pertinence.</li>
</ul>

<p><strong>Le message est simple&nbsp;:</strong> l'abandon d'une piste au bon moment n’est pas un aveu d’échec, c’est un choix stratégique.</p>

<p>Venez apprendre à transformer votre bouton &laquo;&nbsp;panique&nbsp;&raquo; en levier de performance.</p>

<p>À l'ère de l'IA, prenons aussi un peu de temps pour (re)parler des fondamentaux&nbsp;!</p>
      "
      type: "talk"
      salle: ""
      date: ""
      roti: ""
      categories:
        - "Talk"
      language: "🇫🇷"
      speakers:
        - speaker:
