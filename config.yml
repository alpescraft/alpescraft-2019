    - name: "From Lovable to Runnable : du prototype au produit scalable"
      id: "fromlovabletorunnable"
      short_description:  |
        <p>J'ai rejoint une scale-up construite sur des prototypes low-code et IA. Mon boulot : les transformer en produits scalables.</p>
        
        <p>Mais c'est pire que de partir d'une feuille blanche : documentation limitée, shortcuts criticables, clients ravis qui ont maintenant de fortes attentes.</p>
      description: |
                <p>J'ai rejoint une scale-up construite sur des prototypes low-code et IA. Mon boulot : les transformer en produits scalables.</p>

                <p>Mais c'est pire que de partir d'une feuille blanche : documentation limitée, shortcuts criticables, clients ravis qui ont maintenant de fortes attentes.</p>

                <p>Ayant trouvé peu de talks et ressources sur le sujet, j'ai structuré mon approche :</p>

                <ul>
                    <li><strong>Identifier les prototypes à industrialiser</strong> (Map)</li>
                    <li><strong>Aligner les attentes et couper l'inutile</strong> (Align)</li>
